<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lightweight-inspector example</title>
    <link rel="stylesheet" href="example.css" />
  </head>
  <body>
    <button id="rerun">re-run script.js</button>
    <h1>lightweight-inspector example</h1>
    <p>lightweight-inspector example</p>
    <p style="color: cyan; background: black">example inline style</p>
    <p class="styled-paragraph">style sheet style</p>
    <style>
      h1,
      p {
        text-align: right;
      }
    </style>
    <script src="./script.js"></script>
    <script>
      const $ = (s) => document.querySelector(s);
      $("#rerun").addEventListener("click", () => {
        const script = document.createElement("script");
        script.type = "text/javascript";
        script.src = "./script.js?t=" + Date.now();
        console.log(script);
        document.head.append(script);
      });
    </script>
  </body>
</html>
